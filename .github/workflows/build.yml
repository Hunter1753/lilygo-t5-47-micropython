name: Build Firmware

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for changes since last successful build
        id: check
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          LAST_TAG=$(git tag --sort=-creatordate | head -n1)
          if git log ${LAST_TAG}..HEAD --oneline 2>/dev/null | grep -q .; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2
    strategy:
      fail-fast: false
      matrix:
        board:
          - LILYGO_T5_47
          - EPDIY_V2_V3
          - EPDIY_V4
          - EPDIY_V5
          - EPDIY_V6
          - EPDIY_V7
          - EPDIY_V7_103
          - EPDIY_V7_RAW
          - LILYGO_S3

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare (build cross-compiler and apply patches)
        shell: bash
        run: |
          . ${IDF_PATH}/export.sh
          bash prepare.sh

      - name: Build firmware (${{ matrix.board }})
        shell: bash
        run: |
          . ${IDF_PATH}/export.sh
          bash build.sh ${{ matrix.board }}

      - name: Upload firmware artifacts (${{ matrix.board }})
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}-${{ github.sha }}
          path: |
            build/${{ matrix.board }}/micropython.bin
            build/${{ matrix.board }}/bootloader/bootloader.bin
            build/${{ matrix.board }}/partition_table/partition-table.bin
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-*-${{ github.sha }}
          path: build-artifacts/
          merge-multiple: false

      - name: Rename artifacts to include board name
        run: |
          for dir in build-artifacts/firmware-*-${{ github.sha }}; do
            board=$(echo "$dir" | sed 's|build-artifacts/firmware-||; s|-${{ github.sha }}||')
            [ -f "$dir/micropython.bin" ] && mv "$dir/micropython.bin" "build-artifacts/${board}-micropython.bin"
            [ -f "$dir/bootloader/bootloader.bin" ] && mv "$dir/bootloader/bootloader.bin" "build-artifacts/${board}-bootloader.bin"
            [ -f "$dir/partition_table/partition-table.bin" ] && mv "$dir/partition_table/partition-table.bin" "build-artifacts/${board}-partition-table.bin"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build-artifacts/*-micropython.bin
            build-artifacts/*-bootloader.bin
            build-artifacts/*-partition-table.bin
          generate_release_notes: true
